<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Yuma · Comentarios de Huéspedes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #B08D57;
    --gold-light: #D4B483;
    --gold-pale: #F5EDD9;
    --teal: #3D7A6E;
    --teal-light: #5A9E91;
    --teal-pale: #E8F4F1;
    --sand: #F7F3EC;
    --sand-dark: #EDE6D9;
    --text-primary: #2A2419;
    --text-secondary: #6B5F4E;
    --text-muted: #9E9183;
    --border: #DDD5C4;
    --white: #FFFFFF;
    --positive-bg: #E8F4F1;
    --positive-text: #2A5E54;
    --negative-bg: #FAF0ED;
    --negative-text: #7A3520;
    --neutral-bg: #F5F0E8;
    --neutral-text: #6B5F4E;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--text-primary);
    padding: 28px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-meta {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* KPI BAR */
  .kpi-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    text-align: center;
  }

  .kpi-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .kpi-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
  }

  .kpi-value.gold { color: var(--gold); }
  .kpi-value.teal { color: var(--teal); }

  /* FILTERS */
  .filters {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filter-label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  select, input[type="text"] {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--sand);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    cursor: pointer;
    outline: none;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--gold);
  }

  input[type="text"] {
    width: 200px;
  }

  .filter-reset {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-reset:hover { color: var(--gold); }

  /* COUNT DISPLAY */
  .results-info {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* CARDS GRID */
  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 180px 1fr auto;
    gap: 20px;
    align-items: start;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: var(--gold-light); }

  .card.negative { border-left: 3px solid var(--negative-text); }
  .card.positive { border-left: 3px solid var(--teal-light); }
  .card.neutral { border-left: 3px solid var(--border); }

  .card-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .guest-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .card-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-room {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .card-ratings {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .rating-pill {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    background: var(--sand);
    white-space: nowrap;
  }

  .rating-pill.bueno {
    background: #FFF8EA;
    border-color: #D4A84B;
    color: #7A5E1A;
  }

  .rating-pill.malo {
    background: var(--negative-bg);
    border-color: #C0674A;
    color: var(--negative-text);
  }

  .card-middle {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .comment-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.65;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
  }

  .comment-empty {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid transparent;
    font-family: 'DM Sans', sans-serif;
  }

  .tag.area {
    background: var(--teal-pale);
    border-color: #A0CFC8;
    color: var(--positive-text);
  }

  .tag.area-secondary {
    background: var(--gold-pale);
    border-color: #D4B483;
    color: #6B4E1A;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    min-width: 90px;
  }

  .score-badge {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
    color: var(--text-primary);
  }

  .score-badge span {
    font-size: 14px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  .sentiment-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .sentiment-badge.positivo {
    background: var(--positive-bg);
    color: var(--positive-text);
  }

  .sentiment-badge.negativo {
    background: var(--negative-bg);
    color: var(--negative-text);
  }

  .sentiment-badge.sin {
    background: var(--neutral-bg);
    color: var(--neutral-text);
  }

  .recomienda-row {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
  }

  .recomienda-row.si { color: var(--teal); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state p { font-size: 15px; }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
  }

  .error-state {
    background: var(--negative-bg);
    border: 1px solid #C0674A;
    border-radius: 10px;
    padding: 20px 24px;
    color: var(--negative-text);
    font-size: 14px;
  }

  @media (max-width: 720px) {
    header { padding: 20px 16px; }
    .container { padding: 20px 14px; }
    .card { grid-template-columns: 1fr; gap: 12px; }
    .card-right { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
    input[type="text"] { width: 140px; }
  }

  #lock-screen {
    position: fixed;
    inset: 0;
    background: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 24px;
  }

  #lock-screen.hidden { display: none; }

  .lock-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--gold-light);
    letter-spacing: 0.06em;
    text-align: center;
  }

  .lock-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-top: -18px;
  }

  .lock-box {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    width: 280px;
  }

  #lock-input {
    width: 100%;
    border: 1px solid #4A3F2F;
    border-radius: 8px;
    background: #1E1810;
    color: var(--gold-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 10px 16px;
    text-align: center;
    letter-spacing: 0.08em;
    outline: none;
  }

  #lock-input:focus { border-color: var(--gold); }

  #lock-input::placeholder { color: #5A4F3E; letter-spacing: 0.04em; }

  #lock-btn {
    width: 100%;
    padding: 10px;
    background: var(--gold);
    color: var(--text-primary);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s;
  }

  #lock-btn:hover { background: var(--gold-light); }

  #lock-error {
    font-size: 12px;
    color: #C07055;
    min-height: 16px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-logo">Casa Yuma</div>
  <div class="lock-subtitle">Área interna</div>
  <div class="lock-box">
    <input type="password" id="lock-input" placeholder="Contraseña" autofocus>
    <button id="lock-btn">Ingresar</button>
    <div id="lock-error"></div>
  </div>
</div>

<header>
  <div>
    <div class="header-title">Casa Yuma</div>
    <div class="header-subtitle">Registro de encuestas de satisfacción</div>
  </div>
  <div class="header-meta" id="last-updated">Cargando datos…</div>
</header>

<div class="container">

  <div class="kpi-bar" id="kpi-bar">
    <div class="kpi-card">
      <div class="kpi-label">Total respuestas</div>
      <div class="kpi-value" id="kpi-total">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Score promedio</div>
      <div class="kpi-value gold" id="kpi-score">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Nos recomendarían</div>
      <div class="kpi-value teal" id="kpi-recomienda">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Comentarios positivos</div>
      <div class="kpi-value" id="kpi-positivos">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Comentarios negativos</div>
      <div class="kpi-value" id="kpi-negativos">—</div>
    </div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label class="filter-label">Sentimiento</label>
      <select id="filter-sentimiento">
        <option value="">Todos</option>
        <option value="Positivo">Positivo</option>
        <option value="Negativo">Negativo</option>
        <option value="Sin comentario">Sin comentario</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Área</label>
      <select id="filter-area">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Score mín.</label>
      <select id="filter-score">
        <option value="">Cualquiera</option>
        <option value="8">8+</option>
        <option value="7">7+</option>
        <option value="6">6+</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Buscar</label>
      <input type="text" id="filter-search" placeholder="Nombre o comentario…">
    </div>
    <button class="filter-reset" id="btn-reset">Limpiar filtros</button>
  </div>

  <div class="results-info" id="results-info"></div>

  <div class="cards-grid" id="cards-grid">
    <div class="loading-state">Cargando comentarios…</div>
  </div>

</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmqLWbM4T9YiVuW5-bch21_FTuYbMIMqHuq1nsEzOKaqAOTT_R2Iyy0VtYsOmTOfQhqEcDwV90-UH-/pub?output=csv';

let allRows = [];

function parseCSV(text) {
  const lines = text.split('\n');
  const rows = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const cols = [];
    let cur = '';
    let inQuote = false;
    for (let j = 0; j < line.length; j++) {
      const ch = line[j];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);

    // Find header row (row with "Nombre Huésped")
    let headerIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].some(c => c.includes('Nombre') || c.includes('Fecha'))) {
        headerIdx = i;
        break;
      }
    }
    if (headerIdx < 0) throw new Error('No se encontró la fila de encabezados');

    const headers = rows[headerIdx].map(h => h.toLowerCase().replace(/[^a-záéíóúüñ0-9]/gi, '_'));
    const dataRows = rows.slice(headerIdx + 1).filter(r => r.some(c => c.length > 0));

    allRows = dataRows.map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
      return obj;
    }).filter(r => r[headers[0]] || r[headers[1]]);

    // Extract unique areas for filter
    const areas = [...new Set(allRows.map(r => getField(r, ['rea_del_comentario', 'área_del_comentario', 'area_del_comentario'])).filter(Boolean))].sort();
    const areaSelect = document.getElementById('filter-area');
    areas.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a; opt.textContent = a;
      areaSelect.appendChild(opt);
    });

    updateKPIs(allRows);
    renderCards(allRows);

    const lastDate = allRows[0] ? (getField(allRows[0], ['fecha']) || '') : '';
    document.getElementById('last-updated').textContent = lastDate ? 'Última entrada: ' + lastDate : 'Datos actualizados';

  } catch (err) {
    document.getElementById('cards-grid').innerHTML = '<div class="error-state">Error al cargar datos: ' + err.message + '<br><small>Verificá que el CSV de Google Sheets esté publicado como "Anyone with the link".</small></div>';
  }
}

function getField(row, candidates) {
  for (const k of candidates) {
    const found = Object.keys(row).find(key => key.includes(k.toLowerCase().replace(/[^a-z0-9]/g, '')));
    if (found && row[found]) return row[found];
  }
  return '';
}

function flexGet(row, partials) {
  for (const p of partials) {
    const key = Object.keys(row).find(k => k.toLowerCase().replace(/[^a-z0-9]/g,'').includes(p.replace(/[^a-z0-9]/g,'')));
    if (key !== undefined) return row[key] || '';
  }
  return '';
}

function updateKPIs(rows) {
  document.getElementById('kpi-total').textContent = rows.length;
  const scores = rows.map(r => parseFloat(flexGet(r, ['score','scor']))).filter(n => !isNaN(n));
  const avg = scores.length ? (scores.reduce((a,b) => a+b,0)/scores.length).toFixed(1) : '—';
  document.getElementById('kpi-score').textContent = avg;
  const recs = rows.filter(r => (flexGet(r, ['recomendaria','recomend']) || '').toLowerCase().trim() === 'sí' || (flexGet(r, ['recomendaria','recomend']) || '').toLowerCase().trim() === 'si').length;
  document.getElementById('kpi-recomienda').textContent = rows.length ? Math.round(recs / rows.length * 100) + '%' : '—';
  const pos = rows.filter(r => (flexGet(r, ['sentimiento','senti']) || '').toLowerCase().includes('positivo')).length;
  const neg = rows.filter(r => (flexGet(r, ['sentimiento','senti']) || '').toLowerCase().includes('negativo')).length;
  document.getElementById('kpi-positivos').textContent = pos;
  document.getElementById('kpi-negativos').textContent = neg;
}

function renderCards(rows) {
  const grid = document.getElementById('cards-grid');
  document.getElementById('results-info').textContent = rows.length + ' ' + (rows.length === 1 ? 'registro' : 'registros');

  if (!rows.length) {
    grid.innerHTML = '<div class="empty-state"><p>No hay registros que coincidan con los filtros.</p></div>';
    return;
  }

  grid.innerHTML = rows.map(r => {
    const nombre = flexGet(r, ['nombre','name']);
    const fecha = flexGet(r, ['fecha','date']);
    const hab = flexGet(r, ['habitaci','room','hab']);
    const servicio = flexGet(r, ['servicio','service']);
    const limpieza = flexGet(r, ['limpieza','clean']);
    const mant = flexGet(r, ['mantenimiento','mant']);
    const inst = flexGet(r, ['instalaciones','instal']);
    const comentario = flexGet(r, ['comentario','comment']);
    const score = flexGet(r, ['score','scor']);
    const sentimiento = flexGet(r, ['sentimiento','senti']);
    const area = flexGet(r, ['reacoment','areacoment','areadel','areadelcoment']);
    const area2 = flexGet(r, ['seasecund','areasecund','reascund']);
    const recomienda = flexGet(r, ['recomendaria','recomend']);

    const sentLow = sentimiento.toLowerCase();
    const sentClass = sentLow.includes('positivo') ? 'positive' : sentLow.includes('negativo') ? 'negative' : 'neutral';
    const sentBadgeClass = sentLow.includes('positivo') ? 'positivo' : sentLow.includes('negativo') ? 'negativo' : 'sin';
    const sentLabel = sentLow.includes('positivo') ? 'Positivo' : sentLow.includes('negativo') ? 'Negativo' : 'Sin sentimiento';

    const ratingPill = (label, val) => {
      if (!val) return '';
      const low = val.toLowerCase();
      const cls = low === 'bueno' ? 'bueno' : low === 'malo' ? 'malo' : '';
      return '<span class="rating-pill ' + cls + '">' + label + ': ' + val + '</span>';
    };

    const recomClass = (recomienda || '').toLowerCase().trim() === 'sí' || (recomienda || '').toLowerCase().trim() === 'si' ? 'si' : '';

    return '<div class="card ' + sentClass + '">' +
      '<div class="card-left">' +
        '<div class="guest-name">' + (nombre || 'Huésped') + '</div>' +
        '<div class="card-date">' + fecha + '</div>' +
        (hab ? '<div class="card-room">Hab. ' + hab + '</div>' : '') +
        '<div class="card-ratings">' +
          ratingPill('Servicio', servicio) +
          ratingPill('Limpieza', limpieza) +
          ratingPill('Mantenimiento', mant) +
          ratingPill('Instalaciones', inst) +
        '</div>' +
      '</div>' +
      '<div class="card-middle">' +
        (comentario ? '<div class="comment-text">"' + comentario + '"</div>' : '<div class="comment-empty">Sin comentario</div>') +
        '<div class="tags-row">' +
          (area ? '<span class="tag area">' + area + '</span>' : '') +
          (area2 ? '<span class="tag area-secondary">' + area2 + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="card-right">' +
        (score ? '<div class="score-badge">' + score + '<span>/8</span></div>' : '') +
        '<span class="sentiment-badge ' + sentBadgeClass + '">' + sentLabel + '</span>' +
        (recomienda ? '<div class="recomienda-row ' + recomClass + '">Recomendaría: ' + recomienda + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function applyFilters() {
  const sentFil = document.getElementById('filter-sentimiento').value.toLowerCase();
  const areaFil = document.getElementById('filter-area').value.toLowerCase();
  const scoreFil = parseFloat(document.getElementById('filter-score').value) || 0;
  const searchFil = document.getElementById('filter-search').value.toLowerCase().trim();

  const filtered = allRows.filter(r => {
    const sent = (flexGet(r, ['sentimiento','senti']) || '').toLowerCase();
    const area = (flexGet(r, ['reacoment','areacoment','areadel','areadelcoment']) || '').toLowerCase();
    const score = parseFloat(flexGet(r, ['score','scor'])) || 0;
    const nombre = (flexGet(r, ['nombre','name']) || '').toLowerCase();
    const comentario = (flexGet(r, ['comentario','comment']) || '').toLowerCase();

    if (sentFil && !sent.includes(sentFil.split(' ')[0])) return false;
    if (areaFil && !area.includes(areaFil)) return false;
    if (scoreFil && score < scoreFil) return false;
    if (searchFil && !nombre.includes(searchFil) && !comentario.includes(searchFil)) return false;
    return true;
  });

  renderCards(filtered);
}

document.getElementById('filter-sentimiento').addEventListener('change', applyFilters);
document.getElementById('filter-area').addEventListener('change', applyFilters);
document.getElementById('filter-score').addEventListener('change', applyFilters);
document.getElementById('filter-search').addEventListener('input', applyFilters);
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('filter-sentimiento').value = '';
  document.getElementById('filter-area').value = '';
  document.getElementById('filter-score').value = '';
  document.getElementById('filter-search').value = '';
  renderCards(allRows);
});

const PASS_HASH_UNUSED = "";async function sha256(str){const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");}const correctHash=(async()=>sha256("Sonrie26"))();function checkPass(){const val=document.getElementById("lock-input").value;if(!val)return;sha256(val).then(hash=>{correctHash.then(correct=>{if(hash===correct){document.getElementById("lock-screen").classList.add("hidden");sessionStorage.setItem("cy_auth",hash);loadData();}else{document.getElementById("lock-error").textContent="Contraseña incorrecta";document.getElementById("lock-input").value="";document.getElementById("lock-input").focus();}});});}document.getElementById("lock-btn").addEventListener("click",checkPass);document.getElementById("lock-input").addEventListener("keydown",e=>{if(e.key==="Enter")checkPass();});correctHash.then(correct=>{if(sessionStorage.getItem("cy_auth")===correct){document.getElementById("lock-screen").classList.add("hidden");loadData();}});
</script>
