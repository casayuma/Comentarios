<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Yuma · Comentarios de Huéspedes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #B08D57; --gold-light: #D4B483; --gold-pale: #F5EDD9;
    --teal: #3D7A6E; --teal-light: #5A9E91; --teal-pale: #E8F4F1;
    --sand: #F7F3EC; --sand-dark: #EDE6D9;
    --text-primary: #2A2419; --text-secondary: #6B5F4E; --text-muted: #9E9183;
    --border: #DDD5C4; --white: #FFFFFF;
    --positive-bg: #E8F4F1; --positive-text: #2A5E54;
    --negative-bg: #FAF0ED; --negative-text: #7A3520;
    --neutral-bg: #F5F0E8; --neutral-text: #6B5F4E;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text-primary); font-size: 13px; line-height: 1.5; min-height: 100vh; }

  /* LOCK */
  #lock-screen { position: fixed; inset: 0; background: var(--text-primary); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 24px; }
  #lock-screen.hidden { display: none; }
  .lock-logo { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: var(--gold-light); letter-spacing: 0.06em; text-align: center; }
  .lock-subtitle { font-size: 12px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; text-align: center; margin-top: -18px; }
  .lock-box { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 280px; }
  #lock-input { width: 100%; border: 1px solid #4A3F2F; border-radius: 8px; background: #1E1810; color: var(--gold-light); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 10px 16px; text-align: center; letter-spacing: 0.08em; outline: none; }
  #lock-input:focus { border-color: var(--gold); }
  #lock-input::placeholder { color: #5A4F3E; }
  #lock-btn { width: 100%; padding: 10px; background: var(--gold); color: var(--text-primary); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  #lock-btn:hover { background: var(--gold-light); }
  #lock-error { font-size: 12px; color: #C07055; min-height: 16px; text-align: center; }

  /* HEADER */
  header { background: var(--text-primary); padding: 22px 40px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; color: var(--gold-light); letter-spacing: 0.04em; }
  .header-subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
  .header-meta { font-size: 11px; color: var(--text-muted); text-align: right; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  /* KPI BAR */
  .kpi-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .kpi-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; position: relative; }
  .kpi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .kpi-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .kpi-value.gold { color: var(--gold); }
  .kpi-value.teal { color: var(--teal); }
  .kpi-trend { font-size: 11px; margin-top: 4px; }
  .kpi-trend.up { color: var(--teal); }
  .kpi-trend.down { color: #C07055; }
  .kpi-trend.flat { color: var(--text-muted); }

  /* TOOLBAR: filters + action buttons */
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
  .filters { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; flex: 1; }
  .filter-group { display: flex; align-items: center; gap: 7px; }
  .filter-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  select, input[type="text"] { border: 1px solid var(--border); border-radius: 6px; background: var(--sand); color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 9px; cursor: pointer; outline: none; }
  select:focus, input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"] { width: 160px; }
  .filter-reset { font-size: 11px; color: var(--text-muted); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; background: none; border: none; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .filter-reset:hover { color: var(--gold); }

  /* ACTION BUTTONS */
  .action-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-action { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text-secondary); transition: all 0.15s; white-space: nowrap; }
  .btn-action:hover { border-color: var(--gold); color: var(--gold); }
  .btn-action.primary { background: var(--text-primary); color: var(--gold-light); border-color: var(--text-primary); }
  .btn-action.primary:hover { background: #3A3020; }
  .btn-action svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* DESEA INFO PANEL */
  #info-panel { display: none; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; }
  #info-panel.visible { display: block; }
  .info-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .info-panel-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; }
  .info-panel-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; line-height: 1; }
  .info-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .info-table th { text-align: left; padding: 6px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 500; }
  .info-table td { padding: 7px 10px; border-bottom: 1px solid var(--sand-dark); vertical-align: top; }
  .info-table tr:last-child td { border-bottom: none; }

  .results-info { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; padding-left: 2px; }

  /* MONTH SECTION */
  .month-section { margin-bottom: 28px; }
  .month-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .month-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--text-primary); }
  .month-stats { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .month-pill { font-size: 11px; padding: 2px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-secondary); background: var(--sand); white-space: nowrap; }
  .month-pill.pos { background: var(--positive-bg); border-color: #A0CFC8; color: var(--positive-text); }
  .month-pill.neg { background: var(--negative-bg); border-color: #C0A090; color: var(--negative-text); }
  .month-pill.trend-up { background: var(--teal-pale); border-color: var(--teal-light); color: var(--teal); }
  .month-pill.trend-down { background: var(--negative-bg); border-color: #C0A090; color: var(--negative-text); }
  .month-divider { flex: 1; height: 1px; background: var(--border); }

  /* CARDS */
  .cards-grid { display: flex; flex-direction: column; gap: 8px; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; display: grid; grid-template-columns: 190px 1fr auto; gap: 16px; align-items: start; transition: border-color 0.15s; }
  .card:hover { border-color: var(--gold-light); }
  .card.negative { border-left: 3px solid #C07055; }
  .card.positive { border-left: 3px solid var(--teal-light); }
  .card.neutral { border-left: 3px solid var(--border); }

  .card-left { display: flex; flex-direction: column; gap: 2px; }
  .guest-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
  .card-date { font-size: 11px; color: var(--text-muted); }

  .card-middle { display: flex; flex-direction: column; gap: 5px; }
  .card-ratings { display: flex; flex-direction: row; flex-wrap: nowrap; gap: 4px; }
  .rating-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--text-secondary); background: var(--sand); white-space: nowrap; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .rating-pill.bueno { background: #FFF8EA; border-color: #D4A84B; color: #7A5E1A; }
  .rating-pill.malo { background: var(--negative-bg); border-color: #C0674A; color: var(--negative-text); }
  .comment-text { font-size: 13px; color: var(--text-primary); line-height: 1.65; font-style: italic; font-family: 'Cormorant Garamond', serif; }
  .comment-translated { font-size: 11px; color: var(--text-muted); font-style: italic; padding-left: 4px; border-left: 2px solid var(--border); }
  .tags-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 10px; padding: 2px 9px; border-radius: 20px; border: 1px solid transparent; }
  .tag.area { background: var(--teal-pale); border-color: #A0CFC8; color: var(--positive-text); }
  .tag.area-secondary { background: var(--gold-pale); border-color: #D4B483; color: #6B4E1A; }

  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 80px; }
  .score-badge { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; line-height: 1; color: var(--text-primary); }
  .score-badge span { font-size: 12px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-weight: 300; }
  .sentiment-badge { font-size: 10px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .sentiment-badge.positivo { background: var(--positive-bg); color: var(--positive-text); }
  .sentiment-badge.negativo { background: var(--negative-bg); color: var(--negative-text); }
  .sentiment-badge.sin { background: var(--neutral-bg); color: var(--neutral-text); }
  .recomienda-row { font-size: 10px; color: var(--text-muted); text-align: right; }
  .recomienda-row.si { color: var(--teal); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; }
  .loading-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; }
  .error-state { background: var(--negative-bg); border: 1px solid #C0674A; border-radius: 10px; padding: 18px 22px; color: var(--negative-text); font-size: 13px; }

  @media (max-width: 700px) {
    header { padding: 18px 14px; }
    .container { padding: 16px 12px; }
    .card { grid-template-columns: 1fr; gap: 10px; }
    .card-right { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
    input[type="text"] { width: 120px; }
    .action-btns { width: 100%; }
    .btn-action { flex: 1; justify-content: center; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-logo">Casa Yuma</div>
  <div class="lock-subtitle">Área interna</div>
  <div class="lock-box">
    <input type="password" id="lock-input" placeholder="Contraseña" autofocus>
    <button id="lock-btn">Ingresar</button>
    <div id="lock-error"></div>
  </div>
</div>

<header>
  <div>
    <div class="header-title">Casa Yuma</div>
    <div class="header-subtitle">Registro de encuestas de satisfacción</div>
  </div>
  <div class="header-meta" id="last-updated">Cargando…</div>
</header>

<div class="container">

  <!-- KPI BAR -->
  <div class="kpi-bar">
    <div class="kpi-card"><div class="kpi-label">Respuestas</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-trend" id="kpi-total-trend"></div></div>
    <div class="kpi-card"><div class="kpi-label">Score promedio</div><div class="kpi-value gold" id="kpi-score">—</div><div class="kpi-trend" id="kpi-score-trend"></div></div>
    <div class="kpi-card"><div class="kpi-label">Recomendarían</div><div class="kpi-value teal" id="kpi-recomienda">—</div><div class="kpi-trend" id="kpi-rec-trend"></div></div>
    <div class="kpi-card"><div class="kpi-label">Positivos</div><div class="kpi-value" id="kpi-positivos">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Negativos</div><div class="kpi-value" id="kpi-negativos">—</div></div>
    <div class="kpi-card" style="cursor:pointer" id="kpi-info-card" title="Ver lista">
      <div class="kpi-label">Quieren info de regreso</div>
      <div class="kpi-value" id="kpi-desea">—</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="filters">
      <div class="filter-group"><label class="filter-label">Mes</label>
        <select id="filter-mes"></select>
      </div>
      <div class="filter-group"><label class="filter-label">Sentimiento</label>
        <select id="filter-sentimiento"><option value="">Todos</option><option value="Positivo">Positivo</option><option value="Negativo">Negativo</option><option value="Sin comentario">Sin comentario</option></select>
      </div>
      <div class="filter-group"><label class="filter-label">Área</label>
        <select id="filter-area"><option value="">Todas</option></select>
      </div>
      <div class="filter-group"><label class="filter-label">Score mín.</label>
        <select id="filter-score"><option value="">Cualquiera</option><option value="8">8</option><option value="7">7+</option><option value="6">6+</option></select>
      </div>
      <div class="filter-group"><label class="filter-label">Buscar</label>
        <input type="text" id="filter-search" placeholder="Nombre o comentario…">
      </div>
      <button class="filter-reset" id="btn-reset">Limpiar</button>
    </div>
    <div class="action-btns">
      <button class="btn-action" id="btn-export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Exportar CSV
      </button>
    </div>
  </div>

  <!-- DESEA INFO PANEL -->
  <div id="info-panel">
    <div class="info-panel-header">
      <div class="info-panel-title" id="info-panel-title">Huéspedes que desean información de regreso</div>
      <button class="info-panel-close" id="btn-close-info">×</button>
    </div>
    <table class="info-table">
      <thead><tr><th>Nombre</th><th>Fecha</th><th>Hab.</th><th>Teléfono</th><th>Comentario</th></tr></thead>
      <tbody id="info-table-body"></tbody>
    </table>
  </div>

  <div class="results-info" id="results-info"></div>
  <div id="main-content"><div class="loading-state">Cargando comentarios…</div></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmqLWbM4T9YiVuW5-bch21_FTuYbMIMqHuq1nsEzOKaqAOTT_R2Iyy0VtYsOmTOfQhqEcDwV90-UH-/pub?output=csv';
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let allRows = [];
let currentFiltered = [];

// ── CSV PARSER ──────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split('\n');
  return lines.map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let j = 0; j < line.length; j++) {
      const ch = line[j];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

// ── DATE HELPERS ────────────────────────────────────────────
function parseDate(str) {
  const p = (str || '').split('/');
  return p.length === 3 ? new Date(+p[2], +p[1]-1, +p[0]) : null;
}
function monthKey(row) {
  const d = parseDate(row.fecha); if (!d) return null;
  return d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
}

// ── ENGLISH DETECTION & TRANSLATION ────────────────────────
function isEnglish(text) {
  if (!text || text.length < 10) return false;
  if (/[áéíóúüñ¿¡]/i.test(text)) return false;
  const words = text.trim().split(/\s+/);
  if (words.length < 3) return false;
  const engWords = ['the','and','was','our','very','great','good','but','we','it','is','are','for','this','with','had','have','were','not','all','an','its','been','my','me','so','at','us','no','of','to','a','in','on','i','amazing','beautiful','wonderful','staff','room','beach','hotel','stay','loved'];
  const lower = text.toLowerCase();
  return engWords.filter(w => new RegExp('\\b' + w + '\\b').test(lower)).length >= 2;
}
async function translateText(text) {
  if (!text || !isEnglish(text)) return null;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 200,
        messages: [{ role: 'user', content: 'Translate this hotel guest comment to Spanish. Return ONLY the translation, nothing else: ' + text }]
      })
    });
    const data = await res.json();
    return data?.content?.[0]?.text || null;
  } catch { return null; }
}
function refreshTranslation(row) {
  document.querySelectorAll('.card').forEach(card => {
    if (card.dataset.key === (row.nombre + '|' + row.fecha).replace(/"/g,'')) {
      const el = card.querySelector('.comment-translated');
      if (el && row.translated) { el.textContent = row.translated; el.style.display = 'block'; }
    }
  });
}

// ── LOAD DATA ───────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = parseCSV(await res.text());
    const headers = rows[3].map(h => h.toLowerCase().replace(/[\n\r]/g,' ').trim());
    const ci = kw => headers.findIndex(h => h.includes(kw));
    const COL = {
      fecha: ci('fecha'), nombre: ci('nombre'), tel: ci('tel'),
      servicio: ci('servicio'), limpieza: ci('limpieza'), mant: ci('mantenimiento'),
      inst: ci('instalaciones'), desea: ci('desea'), recom: ci('recomend'),
      comment: ci('comentario'), hab: ci('habitaci'), score: ci('score'),
      senti: ci('sentimiento'), area: ci('área del'),
      area2: headers.findIndex((h,i) => h.includes('secundaria') && !h.includes('sentimiento') && i > ci('área del'))
    };
    const dateRe = /^\d{1,2}\/\d{1,2}\/\d{4}$/;
    allRows = rows.slice(4)
      .filter(r => r[COL.fecha] && dateRe.test(r[COL.fecha].trim()))
      .map(r => ({
        fecha: r[COL.fecha]?.trim()||'', nombre: r[COL.nombre]?.trim()||'',
        tel: r[COL.tel]?.trim()||'', servicio: r[COL.servicio]?.trim()||'',
        limpieza: r[COL.limpieza]?.trim()||'', mant: r[COL.mant]?.trim()||'',
        inst: r[COL.inst]?.trim()||'', desea: r[COL.desea]?.trim()||'',
        recom: r[COL.recom]?.trim()||'', comment: r[COL.comment]?.trim()||'',
        hab: r[COL.hab]?.trim()||'', score: r[COL.score]?.trim()||'',
        senti: r[COL.senti]?.trim()||'', area: r[COL.area]?.trim()||'',
        area2: COL.area2 >= 0 ? r[COL.area2]?.trim()||'' : '',
        translated: null
      }));

    // Populate area filter
    const areas = [...new Set(allRows.map(r => r.area).filter(Boolean))].sort();
    const areaSelect = document.getElementById('filter-area');
    areas.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; areaSelect.appendChild(o); });

    // Populate month filter — "Todos" first, then months newest→oldest
    const monthKeys = [...new Set(allRows.map(r => monthKey(r)).filter(Boolean))];
    const mesSelect = document.getElementById('filter-mes');
    mesSelect.innerHTML = '<option value="">Todos los meses</option>';
    monthKeys.forEach(key => {
      const [y, m] = key.split('-');
      const o = document.createElement('option'); o.value = key;
      o.textContent = MESES[+m] + ' ' + y; mesSelect.appendChild(o);
    });
    const now = new Date();
    const curKey = now.getFullYear() + '-' + String(now.getMonth()).padStart(2,'0');
    mesSelect.value = monthKeys.includes(curKey) ? curKey : (monthKeys[0] || '');

    document.getElementById('last-updated').textContent = allRows[0]?.fecha ? 'Última entrada: ' + allRows[0].fecha : '';

    applyFilters();

  } catch(err) {
    document.getElementById('main-content').innerHTML = '<div class="error-state">Error al cargar datos: ' + err.message + '</div>';
  }
}

// ── MONTH STATS (for trend comparison) ─────────────────────
function getMonthStats(key) {
  const rows = allRows.filter(r => monthKey(r) === key);
  const scores = rows.map(r => parseFloat(r.score)).filter(n => !isNaN(n) && n > 0);
  const recs = rows.filter(r => r.recom.toLowerCase().replace('í','i') === 'si').length;
  return {
    count: rows.length,
    score: scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null,
    recPct: rows.length ? recs/rows.length*100 : null,
    pos: rows.filter(r => r.senti.toLowerCase().includes('positivo')).length,
    neg: rows.filter(r => r.senti.toLowerCase().includes('negativo')).length,
    desea: rows.filter(r => r.desea.toLowerCase().includes('s')).length
  };
}

function prevMonthKey(key) {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m, 1); d.setMonth(d.getMonth() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
}

// ── KPI UPDATE ──────────────────────────────────────────────
function updateKPIs(rows) {
  const curKey = document.getElementById('filter-mes').value;
  const prevKey = prevMonthKey(curKey);
  const prev = getMonthStats(prevKey);
  const hasPrev = prev.count > 0;

  const scores = rows.map(r => parseFloat(r.score)).filter(n => !isNaN(n) && n > 0);
  const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
  const recs = rows.filter(r => r.recom.toLowerCase().replace('í','i') === 'si').length;
  const recPct = rows.length ? Math.round(recs/rows.length*100) : null;
  const pos = rows.filter(r => r.senti.toLowerCase().includes('positivo')).length;
  const neg = rows.filter(r => r.senti.toLowerCase().includes('negativo')).length;
  const desea = rows.filter(r => r.desea.toLowerCase().includes('s')).length;

  document.getElementById('kpi-total').textContent = rows.length;
  document.getElementById('kpi-score').textContent = avg ? avg.toFixed(1) : '—';
  document.getElementById('kpi-recomienda').textContent = recPct !== null ? recPct + '%' : '—';
  document.getElementById('kpi-positivos').textContent = pos;
  document.getElementById('kpi-negativos').textContent = neg;
  document.getElementById('kpi-desea').textContent = desea;

  function trendEl(id, cur, prevVal, unit='', higher=true) {
    const el = document.getElementById(id); if (!el) return;
    if (!hasPrev || prevVal === null || cur === null) { el.textContent = ''; return; }
    const diff = cur - prevVal;
    const better = higher ? diff > 0 : diff < 0;
    const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
    const cls = diff === 0 ? 'flat' : better ? 'up' : 'down';
    const label = diff === 0 ? 'igual que ' + MESES[+prevKey.split('-')[1]] : arrow + ' ' + Math.abs(diff % 1 === 0 ? diff : parseFloat(diff.toFixed(1))) + unit + ' vs ' + MESES[+prevKey.split('-')[1]];
    el.textContent = label; el.className = 'kpi-trend ' + cls;
  }
  trendEl('kpi-total-trend', rows.length, prev.count, '');
  trendEl('kpi-score-trend', avg, prev.score, ' pts');
  trendEl('kpi-rec-trend', recPct, prev.recPct, '%');
}

// ── RENDER ──────────────────────────────────────────────────
function renderAll(rows) {
  currentFiltered = rows;
  document.getElementById('results-info').textContent = rows.length + (rows.length === 1 ? ' registro' : ' registros');
  const main = document.getElementById('main-content');
  if (!rows.length) { main.innerHTML = '<div class="empty-state">No hay registros que coincidan.</div>'; return; }

  const groups = {};
  rows.forEach(r => {
    const key = monthKey(r); if (!key) return;
    const d = parseDate(r.fecha);
    if (!groups[key]) groups[key] = { label: MESES[d.getMonth()] + ' ' + d.getFullYear(), key, rows: [] };
    groups[key].rows.push(r);
  });
  Object.values(groups).forEach(g => g.rows.sort((a,b) => (parseDate(a.fecha)||0)-(parseDate(b.fecha)||0)));
  const sortedKeys = Object.keys(groups).sort((a,b) => b.localeCompare(a));

  main.innerHTML = sortedKeys.map(key => {
    const g = groups[key];
    const pos = g.rows.filter(r => r.senti.toLowerCase().includes('positivo')).length;
    const neg = g.rows.filter(r => r.senti.toLowerCase().includes('negativo')).length;
    const scores = g.rows.map(r => parseFloat(r.score)).filter(n => !isNaN(n) && n > 0);
    const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '';
    const prev = getMonthStats(prevMonthKey(key));
    let trendPill = '';
    if (prev.count > 0 && avg && prev.score) {
      const diff = parseFloat(avg) - prev.score;
      if (Math.abs(diff) >= 0.1) {
        const cls = diff > 0 ? 'trend-up' : 'trend-down';
        trendPill = '<span class="month-pill ' + cls + '">' + (diff > 0 ? '↑' : '↓') + ' ' + Math.abs(diff.toFixed(1)) + ' vs ' + MESES[+prevMonthKey(key).split('-')[1]] + '</span>';
      }
    }
    return '<div class="month-section">' +
      '<div class="month-header">' +
        '<div class="month-title">' + g.label + '</div>' +
        '<div class="month-stats">' +
          '<span class="month-pill">' + g.rows.length + ' huéspedes</span>' +
          (avg ? '<span class="month-pill">⌀ ' + avg + '/8</span>' : '') +
          (pos ? '<span class="month-pill pos">' + pos + ' positivos</span>' : '') +
          (neg ? '<span class="month-pill neg">' + neg + ' negativos</span>' : '') +
          trendPill +
        '</div>' +
        '<div class="month-divider"></div>' +
      '</div>' +
      '<div class="cards-grid">' + g.rows.map(r => cardHTML(r)).join('') + '</div>' +
    '</div>';
  }).join('');
}

function cardHTML(r) {
  const sentLow = r.senti.toLowerCase();
  const sentClass = sentLow.includes('positivo') ? 'positive' : sentLow.includes('negativo') ? 'negative' : 'neutral';
  const sentBadge = sentLow.includes('positivo') ? 'positivo' : sentLow.includes('negativo') ? 'negativo' : 'sin';
  const sentLabel = sentLow.includes('positivo') ? 'Positivo' : sentLow.includes('negativo') ? 'Negativo' : 'Sin sentimiento';
  const pill = (lbl, val) => {
    if (!val) return '';
    const lo = val.toLowerCase();
    const cls = lo === 'bueno' ? 'bueno' : lo === 'malo' ? 'malo' : '';
    return '<span class="rating-pill ' + cls + '">' + lbl + ': ' + val + '</span>';
  };
  const recClass = r.recom.toLowerCase().replace('í','i') === 'si' ? 'si' : '';
  return '<div class="card ' + sentClass + '" data-key="' + (r.nombre+'|'+r.fecha).replace(/"/g,'') + '">' +
    '<div class="card-left">' +
      '<div class="guest-name">' + (r.nombre||'Huésped') + '</div>' +
      '<div class="card-date">' + r.fecha + (r.hab ? ' · Hab. '+r.hab : '') + '</div>' +
    '</div>' +
    '<div class="card-middle">' +
      '<div class="card-ratings">' + pill('Servicio',r.servicio) + pill('Limpieza',r.limpieza) + pill('Mant.',r.mant) + pill('Inst.',r.inst) + '</div>' +
      (r.comment ? '<div class="comment-text">"' + r.comment + '"</div><div class="comment-translated" style="display:' + (r.translated?'block':'none') + '">' + (r.translated||'') + '</div>' : '') +
      '<div class="tags-row">' + (r.area?'<span class="tag area">'+r.area+'</span>':'') + (r.area2?'<span class="tag area-secondary">'+r.area2+'</span>':'') + '</div>' +
    '</div>' +
    '<div class="card-right">' +
      (r.score && parseFloat(r.score)>0 ? '<div class="score-badge">'+r.score+'<span>/8</span></div>' : '') +
      '<span class="sentiment-badge ' + sentBadge + '">' + sentLabel + '</span>' +
      (r.recom ? '<div class="recomienda-row '+recClass+'">Recomendaría: '+r.recom+'</div>' : '') +
    '</div>' +
  '</div>';
}

// ── FILTERS ─────────────────────────────────────────────────
function applyFilters() {
  const s = document.getElementById('filter-sentimiento').value.toLowerCase();
  const a = document.getElementById('filter-area').value.toLowerCase();
  const sc = parseFloat(document.getElementById('filter-score').value) || 0;
  const q = document.getElementById('filter-search').value.toLowerCase().trim();
  const mes = document.getElementById('filter-mes').value;
  const filtered = allRows.filter(r => {
    if (s && !r.senti.toLowerCase().includes(s.split(' ')[0])) return false;
    if (a && r.area.toLowerCase() !== a) return false;
    if (sc) { const v = parseFloat(r.score); if (isNaN(v)||v<sc) return false; }
    if (q && !r.nombre.toLowerCase().includes(q) && !r.comment.toLowerCase().includes(q)) return false;
    if (mes) { const k = monthKey(r); if (k !== mes) return false; }
    return true;
  });
  updateKPIs(filtered);
  renderAll(filtered);
}

['filter-sentimiento','filter-area','filter-score','filter-mes'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('filter-search').addEventListener('input', applyFilters);
document.getElementById('btn-reset').addEventListener('click', () => {
  ['filter-sentimiento','filter-area','filter-score'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('filter-search').value = '';
  const now = new Date();
  const curKey = now.getFullYear() + '-' + String(now.getMonth()).padStart(2,'0');
  const mesSelect = document.getElementById('filter-mes');
  const keys = [...mesSelect.options].map(o => o.value).filter(Boolean);
  mesSelect.value = keys.includes(curKey) ? curKey : (keys[0] || '');
  applyFilters();
});

// ── DESEA INFO PANEL ─────────────────────────────────────────
document.getElementById('kpi-info-card').addEventListener('click', () => {
  const mes = document.getElementById('filter-mes').value;
  const rows = currentFiltered.filter(r => r.desea.toLowerCase().includes('s'));
  const tbody = document.getElementById('info-table-body');
  const mesLabel = mes ? (' — ' + document.getElementById('filter-mes').selectedOptions[0]?.textContent) : '';
  document.getElementById('info-panel-title').textContent = 'Huéspedes que desean información de regreso' + mesLabel;
  tbody.innerHTML = rows.length
    ? rows.map(r => '<tr><td>' + r.nombre + '</td><td>' + r.fecha + '</td><td>' + (r.hab||'—') + '</td><td>' + (r.tel||'—') + '</td><td style="max-width:300px;font-style:italic;color:var(--text-secondary)">' + (r.comment||'—') + '</td></tr>').join('')
    : '<tr><td colspan="5" style="color:var(--text-muted);text-align:center;padding:20px">Ninguno en el período seleccionado</td></tr>';
  const panel = document.getElementById('info-panel');
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible')) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});
document.getElementById('btn-close-info').addEventListener('click', () =>
  document.getElementById('info-panel').classList.remove('visible'));

// ── EXPORT CSV ───────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  const rows = currentFiltered;
  if (!rows.length) return;
  const headers = ['Fecha','Nombre','Hab.','Score','Sentimiento','Área','Servicio','Limpieza','Mantenimiento','Instalaciones','¿Recomendaría?','¿Desea info?','Comentario'];
  const escape = v => '"' + (v||'').replace(/"/g,'""') + '"';
  const lines = [headers.join(','), ...rows.map(r =>
    [r.fecha,r.nombre,r.hab,r.score,r.senti,r.area,r.servicio,r.limpieza,r.mant,r.inst,r.recom,r.desea,r.comment].map(escape).join(',')
  )];
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const mesLabel = (document.getElementById('filter-mes').selectedOptions[0]?.textContent || 'comentarios').replace(' ','_');
  a.href = url; a.download = 'CasaYuma_' + mesLabel + '.csv';
  a.click(); URL.revokeObjectURL(url);
});

// ── PASSWORD ─────────────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
const correctHash = sha256('Sonrie26');
function checkPass() {
  const val = document.getElementById('lock-input').value; if (!val) return;
  sha256(val).then(hash => correctHash.then(correct => {
    if (hash === correct) {
      document.getElementById('lock-screen').classList.add('hidden');
      sessionStorage.setItem('cy_auth', hash); loadData();
    } else {
      document.getElementById('lock-error').textContent = 'Contraseña incorrecta';
      document.getElementById('lock-input').value = ''; document.getElementById('lock-input').focus();
    }
  }));
}
document.getElementById('lock-btn').addEventListener('click', checkPass);
document.getElementById('lock-input').addEventListener('keydown', e => { if (e.key==='Enter') checkPass(); });
correctHash.then(correct => {
  if (sessionStorage.getItem('cy_auth') === correct) {
    document.getElementById('lock-screen').classList.add('hidden'); loadData();
  }
});
</script>
